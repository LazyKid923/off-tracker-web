<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Off Tracker Web</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <h1>Off Tracker</h1>
          <p id="activePersonnelText" class="muted"></p>
        </div>
        <div class="topbar-actions">
          <button id="exportBtn" class="ghost">Export JSON</button>
          <label for="importInput" class="ghost import-label">Import JSON</label>
          <input id="importInput" type="file" accept="application/json" />
        </div>
      </header>

      <nav class="tabs" id="tabNav">
        <button data-tab="dashboard" class="tab active">Dashboard</button>
        <button data-tab="grants" class="tab">Off Grants</button>
        <button data-tab="usage" class="tab">Off Usage</button>
        <button data-tab="calendar" class="tab">Calendar</button>
        <button data-tab="personnel" class="tab">Personnel</button>
        <button data-tab="logs" class="tab">Edit Logs</button>
      </nav>

      <main>
        <section data-panel="dashboard" class="panel active"></section>
        <section data-panel="grants" class="panel"></section>
        <section data-panel="usage" class="panel"></section>
        <section data-panel="calendar" class="panel"></section>
        <section data-panel="personnel" class="panel"></section>
        <section data-panel="logs" class="panel"></section>
      </main>
    </div>

    <div id="modalRoot"></div>
    <script>
      // Override this before deployment if API host is different.
      window.OFF_TRACKER_API_BASE = window.OFF_TRACKER_API_BASE || 'http://localhost:8787/api';
    </script>
    <script type="module" src="./app.js"></script>
  </body>
</html>
