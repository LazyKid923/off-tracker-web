version: '3.9'
services:
  postgres:
    image: postgres:16
    container_name: off-tracker-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: off_tracker
    ports:
      - '5432:5432'
    volumes:
      - off_tracker_pgdata:/var/lib/postgresql/data

volumes:
  off_tracker_pgdata:
